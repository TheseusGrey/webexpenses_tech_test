services:
  db:
    image: docker.io/postgres:17
    container_name: claims-db
    environment:
      POSTGRES_DB: claims
      POSTGRES_USER: claims
      POSTGRES_PASSWORD: claims
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claims"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: claims-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/claims
      SPRING_DATASOURCE_USERNAME: claims
      SPRING_DATASOURCE_PASSWORD: claims
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
